<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password · Course Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <div class="card-icon">🔑</div>
  <h1>Forgot Password?</h1>
  <p class="subtitle">Enter your email and we'll send you a reset link.</p>
  <input id="email" type="email" placeholder="Email">
  <button onclick="sendReset()">Send Reset Link</button>
  <p class="msg" id="msg"></p>
  <p class="link"><a href="login.html">Back to login</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function sendReset() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  if (!email) { msg.textContent = "Please enter your email"; return; }

  auth.sendPasswordResetEmail(email)
    .then(() => {
      msg.style.color = '#4fdc7c';
      msg.textContent = "Reset link sent — check your inbox (and spam folder).";
    })
    .catch(err => { msg.style.color = '#ff8080'; msg.textContent = err.message; });
}
</script>
</body>
</html>
