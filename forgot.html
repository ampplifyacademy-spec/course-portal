<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>পাসওয়ার্ড রিসেট</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <h1>পাসওয়ার্ড ভুলে গেছেন?</h1>
  <p style="margin-bottom:1rem; color:#aaa; font-size:.9rem;">তোমার ইমেইল দাও, রিসেট লিংক পাঠায় দিব।</p>
  <input id="email" type="email" placeholder="ইমেইল">
  <button onclick="sendReset()">রিসেট লিংক পাঠাও</button>
  <p class="msg" id="msg"></p>
  <p class="link"><a href="login.html">লগইনে ফিরে যাও</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function sendReset() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  if (!email) { msg.textContent = "ইমেইল দাও"; return; }

  auth.sendPasswordResetEmail(email)
    .then(() => {
      msg.style.color = '#4fdc7c';
      msg.textContent = "রিসেট লিংক পাঠানো হয়েছে, ইমেইল চেক করো (স্প্যাম ফোল্ডারও দেখো)।";
    })
    .catch(err => { msg.style.color = '#ff8080'; msg.textContent = err.message; });
}
</script>
</body>
</html>
