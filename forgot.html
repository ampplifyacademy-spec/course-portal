<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset Password · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <span class="brand"><span class="a">A</span>mpplify Academy</span>
  <h1>Forgot Password?</h1>
  <p class="subtitle">Enter your email and we'll send you a reset link.</p>

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="you@example.com">
  <button onclick="sendReset()">Send Reset Link</button>
  <p class="msg" id="msg"></p>
  <p class="link"><a href="login.html">Back to login</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/site-content.js"></script>
<script>
loadSiteContent();

function sendReset() {
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('msg');
  if (!email) { msg.textContent = "Please enter your email"; return; }

  auth.sendPasswordResetEmail(email)
    .then(() => {
      msg.style.color = 'var(--success)';
      msg.textContent = "Reset link sent — check your inbox (and spam folder).";
    })
    .catch(err => { msg.style.color = 'var(--danger)'; msg.textContent = err.message; });
}
</script>
</body>
</html>
