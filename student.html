<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Courses · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card wide">
  <span class="brand"><span class="a">A</span>mpplify Academy</span>
  <div class="top-bar">
    <h1>My Courses</h1>
    <button class="secondary" onclick="doLogout()">Log Out</button>
  </div>
  <ul class="course-list" id="courseList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
auth.onAuthStateChanged(user => {
  if (!user) { location.href = 'login.html'; return; }
  db.collection('users').doc(user.uid).get().then(doc => {
    if (!doc.exists || doc.data().status !== 'approved') {
      location.href = 'login.html';
      return;
    }
    const mySession = localStorage.getItem('session_' + user.uid);
    if (doc.data().currentSessionId && doc.data().currentSessionId !== mySession) {
      kickOut(user.uid);
      return;
    }
    loadCourses(doc.data().blockedCourses || []);
    watchSession(user.uid, mySession);
  });
});

function watchSession(uid, mySession) {
  db.collection('users').doc(uid).onSnapshot(doc => {
    if (doc.exists && doc.data().currentSessionId && doc.data().currentSessionId !== mySession) {
      kickOut(uid);
    }
  });
}

function kickOut(uid) {
  alert('Your account was logged in on another device. For security, you have been logged out here.');
  auth.signOut().then(() => location.href = 'login.html');
}

function loadCourses(blockedCourses) {
  db.collection('courses').get().then(snap => {
    const list = document.getElementById('courseList');
    const visible = snap.docs.filter(doc => !blockedCourses.includes(doc.id));
    if (visible.length === 0) {
      list.innerHTML = '<li>No courses available yet.</li>';
      return;
    }
    list.innerHTML = '';
    visible.forEach(doc => {
      const c = doc.data();
      const li = document.createElement('li');
      li.innerHTML = `<span>${c.name}</span><a href="${c.driveLink}" target="_blank"><button>View</button></a>`;
      list.appendChild(li);
    });
  });
}

function doLogout() {
  auth.signOut().then(() => location.href = 'login.html');
}
</script>
</body>
</html>
