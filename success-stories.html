<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Success Stories · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body.course-page { display: block; padding: 0; }
  .cnav { display: flex; align-items: center; justify-content: space-between; padding: 1.75rem 4rem; flex-wrap: wrap; gap: 1rem; position: relative; }
  .cnav-links { display: flex; gap: 2.25rem; font: 600 .95rem var(--font-body); color: var(--text-soft); }
  .cnav-links a { color: inherit; text-decoration: none; cursor: pointer; }
  .cnav-links a:hover { color: var(--accent); }
  .cnav button, .cta-band button { width: auto; margin-top: 0; }
  .cnav-right { display: flex; align-items: center; gap: .75rem; }
  .menu-toggle { display: none; background: none; border: 1px solid var(--border-strong); color: var(--text); font-size: 1.2rem; line-height: 1; padding: .5rem .75rem; border-radius: var(--radius-sm); cursor: pointer; }
  .csection { padding: 5rem 4rem; }
  .csection h2 { font-size: 2.1rem; text-align: center; margin-bottom: .6rem; }
  .csection > p.lead { text-align: center; color: var(--text-soft); margin-bottom: 2.75rem; }
  .story-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .story-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
  .story-card img { width: 100%; height: 220px; object-fit: cover; display: block; }
  .story-card .body { padding: 1.5rem; }
  .story-card .name { font: 700 1rem var(--font-display); margin-bottom: .5rem; }
  .story-card p { color: var(--text-soft); font-size: .9rem; line-height: 1.7; }
  .cta-band { background: linear-gradient(135deg, rgba(0,181,254,.13), rgba(253,125,1,.13)); padding: 3.5rem 4rem; text-align: center; }
  .cta-band h3 { font-size: 1.9rem; margin-bottom: .75rem; }
  .cta-band button { width: auto; margin: 0 auto; padding: 1rem 2.25rem; }
  @media (max-width: 760px) {
    .cnav { padding: 1rem 1.25rem; }
    .menu-toggle { display: block; }
    .cnav-right button:not(.menu-toggle) { display: none; }
    .cnav-links { display: none; width: 100%; order: 3; flex-direction: column; gap: 0; margin-top: 1rem; }
    .cnav-links.open { display: flex; }
    .cnav-links a { padding: .85rem 0; border-bottom: 1px solid var(--border); }
    .cnav button { padding: .6rem 1.1rem; font-size: .85rem; }
    .csection { padding: 3rem 1.25rem; }
    .cta-band { padding: 2.5rem 1.25rem; }
    .cta-band button { padding: .8rem 1.5rem; font-size: .9rem; }
  }
</style>
</head>
<body class="course-page">

<nav class="cnav">
  <span class="brand"><span class="a">A</span>mpplify Academy</span>
  <div class="cnav-links">
    <a href="course.html#curriculum">Curriculum</a>
    <a href="services.html">Services</a>
    <a href="tools.html" id="navToolsLink">Tools</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="success-stories.html">Success Stories</a>
    <a href="course.html#pricing">Pricing</a>
    <a href="course.html#faq">FAQ</a>
  </div>
  <div class="cnav-right">
    <button onclick="location.href='signup.html'">Enroll Now</button>
    <button class="menu-toggle" onclick="toggleMobileNav()" id="menuToggleBtn">☰ Menu</button>
  </div>
</nav>

<section class="csection" style="padding-top:3.5rem;">
  <h2>Student Success Stories</h2>
  <p class="lead">Real students, real results — case studies from past work.</p>
  <div class="story-grid" id="storyGrid"></div>
</section>

<div class="cta-band">
  <h3>Ready to write your own success story?</h3>
  <button onclick="location.href='signup.html'">Enroll Now</button>
</div>

<div class="social-footer" id="socialFooter"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/site-content.js"></script>
<script>
function toggleMobileNav() {
  document.querySelector('.cnav-links').classList.toggle('open');
}

loadSiteContent().then(content => {
  const stories = content.course.successStories || [];
  document.getElementById('storyGrid').innerHTML = stories.length
    ? stories.map(s => `
      <div class="story-card">
        ${s.imageUrl ? `<img src="${driveImgUrl(s.imageUrl)}" alt="${s.name}">` : ''}
        <div class="body">
          <div class="name">${s.name}</div>
          <p>${s.text}</p>
        </div>
      </div>`).join('')
    : '<p style="text-align:center; color:var(--text-muted); grid-column:1/-1;">Success stories coming soon.</p>';

  const firstTool = (content.course.tools || [])[0];
  if (firstTool && firstTool.link) {
    const link = document.getElementById('navToolsLink');
    link.href = firstTool.link;
    link.target = '_blank';
  }

  renderSocialFooter(content.social);
});
</script>
</body>
</html>
