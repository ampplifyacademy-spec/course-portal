<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enroll · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  .bank-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.1rem; margin-bottom: 1.1rem; font-size: .88rem; }
  .bank-tabs { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .9rem; }
  .bank-tab-btn { padding: .5rem 1rem; border-radius: 999px; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-soft); font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .bank-tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .bank-panel { display: none; }
  .bank-panel.active { display: block; }
  .bank-box .row { display: flex; justify-content: space-between; padding: .3rem 0; border-bottom: 1px solid var(--border); }
  .bank-box .row:last-child { border-bottom: none; }
  .bank-box .row span:first-child { color: var(--text-muted); }
  .bank-box .row span:last-child { font-weight: 700; }
  .bank-box .note { color: var(--text-muted); font-size: .8rem; margin-top: .6rem; line-height: 1.4; }
  label.upload-btn { display: block; width: 100%; text-align: center; padding: .8rem; border-radius: var(--radius-sm); border: 1px dashed var(--border-strong); background: var(--surface); color: var(--text-soft); font-size: .9rem; cursor: pointer; margin: .4rem 0; }
</style>
</head>
<body>
<div class="card">
  <span class="brand"><span class="a">A</span>mpplify Academy</span>
  <h1>Create Account</h1>
  <p class="subtitle">Pay via bank transfer using the details below, then upload your payment receipt. We'll approve your account once payment is verified.</p>

  <div class="bank-box" id="bankBox"></div>

  <label for="name">Full name</label>
  <input id="name" placeholder="Your full name">
  <label for="email">Email</label>
  <input id="email" type="email" placeholder="you@example.com">
  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Min 6 characters">
  <label>Payment receipt</label>
  <input type="file" id="invoiceFile" accept="image/*,application/pdf" style="display:none;" onchange="onInvoiceChosen(this.files[0])">
  <label class="upload-btn" for="invoiceFile" id="invoiceLabel">Choose receipt photo/PDF</label>

  <button onclick="doSignup()">Sign Up</button>
  <p class="msg" id="msg"></p>
  <p class="link">Already have an account? <a href="login.html">Log in</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/site-content.js"></script>
<script>
let uploadScriptUrl = '';
let invoiceFile = null;

loadSiteContent().then(content => {
  const b = content.bankDetails;
  const box = document.getElementById('bankBox');
  const accounts = (b.accounts || []).filter(a => a.bankName || a.accountNumber);

  if (!accounts.length) {
    box.innerHTML = '<div class="row"><span>Bank details not set up yet — contact us.</span></div>';
  } else {
    const tabs = accounts.map((a, i) => `<button type="button" class="bank-tab-btn${i === 0 ? ' active' : ''}" onclick="showBankTab(${i})">${a.bankName || 'Bank ' + (i + 1)}</button>`).join('');
    const panels = accounts.map((a, i) => {
      const rows = [
        ['Bank Name', a.bankName], ['Account Name', a.accountName],
        ['Account Number', a.accountNumber], ['IBAN', a.iban]
      ].filter(r => r[1]).map(r => `<div class="row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('');
      return `<div class="bank-panel${i === 0 ? ' active' : ''}" id="bankPanel${i}">${rows}</div>`;
    }).join('');
    box.innerHTML = `<div class="bank-tabs">${tabs}</div>${panels}`;
  }
  box.innerHTML += (b.instructions ? `<div class="note">${b.instructions}</div>` : '');

  uploadScriptUrl = b.uploadScriptUrl;
});

function showBankTab(i) {
  document.querySelectorAll('.bank-tab-btn').forEach((btn, idx) => btn.classList.toggle('active', idx === i));
  document.querySelectorAll('.bank-panel').forEach((panel, idx) => panel.classList.toggle('active', idx === i));
}

function onInvoiceChosen(file) {
  invoiceFile = file;
  document.getElementById('invoiceLabel').textContent = file ? file.name : 'Choose receipt photo/PDF';
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function uploadInvoiceToDrive(file, studentName) {
  if (!uploadScriptUrl) return Promise.resolve('');
  return fileToBase64(file).then(base64 => {
    return fetch(uploadScriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        fileData: base64,
        mimeType: file.type,
        fileName: studentName + ' - ' + file.name
      })
    }).then(r => r.json()).then(data => data.fileUrl || '');
  });
}

function doSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');

  if (!name || !email || !password || !invoiceFile) {
    msg.textContent = "Please fill in all fields and choose your payment receipt";
    return;
  }
  if (!uploadScriptUrl) {
    msg.textContent = "Receipt upload isn't set up yet — please contact us directly";
    return;
  }

  msg.style.color = 'var(--text-muted)';
  msg.textContent = "Uploading receipt...";

  uploadInvoiceToDrive(invoiceFile, name)
    .then(invoiceUrl => {
      msg.textContent = "Creating account...";
      return auth.createUserWithEmailAndPassword(email, password).then(cred => {
        return db.collection('users').doc(cred.user.uid).set({
          name, email, invoiceUrl,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    })
    .then(() => {
      msg.style.color = 'var(--success)';
      msg.textContent = "Signup successful! We'll notify you by email once your account is approved.";
    })
    .catch(err => { msg.style.color = 'var(--danger)'; msg.textContent = err.message; });
}
</script>
</body>
</html>
