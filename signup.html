<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Enroll · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <span class="brand"><span class="a">A</span>mpplify Academy</span>
  <h1>Create Account</h1>
  <p class="subtitle">Pay via bank transfer, then sign up with your transaction reference. We'll approve your account once payment is verified.</p>

  <label for="name">Full name</label>
  <input id="name" placeholder="Your full name">
  <label for="email">Email</label>
  <input id="email" type="email" placeholder="you@example.com">
  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Min 6 characters">
  <label for="txn">Bank transaction ID</label>
  <input id="txn" placeholder="Transaction reference">
  <button onclick="doSignup()">Sign Up</button>
  <p class="msg" id="msg"></p>
  <p class="link">Already have an account? <a href="login.html">Log in</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function doSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const txn = document.getElementById('txn').value.trim();
  const msg = document.getElementById('msg');

  if (!name || !email || !password || !txn) {
    msg.textContent = "Please fill in all fields";
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(cred => {
      return db.collection('users').doc(cred.user.uid).set({
        name, email, txn,
        status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    })
    .then(() => {
      msg.style.color = 'var(--success)';
      msg.textContent = "Signup successful! We'll notify you by email once your account is approved.";
    })
    .catch(err => { msg.textContent = err.message; });
}
</script>
</body>
</html>
