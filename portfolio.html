<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body.course-page { display: block; padding: 0; }
  .cnav { display: flex; align-items: center; justify-content: space-between; padding: 1.75rem 4rem; flex-wrap: wrap; gap: 1rem; position: relative; }
  .cnav-links { display: flex; gap: 2.25rem; font: 600 .95rem var(--font-body); color: var(--text-soft); }
  .cnav-links a { color: inherit; text-decoration: none; cursor: pointer; }
  .cnav-links a:hover { color: var(--accent); }
  .cnav button, .cta-band button { width: auto; margin-top: 0; }
  .cnav-right { display: flex; align-items: center; gap: .75rem; }
  .menu-toggle { display: none; background: none; border: 1px solid var(--border-strong); color: var(--text); font-size: 1.2rem; line-height: 1; padding: .5rem .75rem; border-radius: var(--radius-sm); cursor: pointer; }
  .csection { padding: 5rem 4rem; }
  .csection h2 { font-size: 2.1rem; text-align: center; margin-bottom: .6rem; }
  .csection > p.lead { text-align: center; color: var(--text-soft); margin-bottom: 2.75rem; }
  .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .portfolio-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
  .portfolio-card .img-wrap { width: 100%; max-width: 1000px; padding-top: 100%; position: relative; background: var(--surface-alt); flex-shrink: 0; }
  .portfolio-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .portfolio-card .video-badge { position: absolute; top: .6rem; right: .6rem; background: rgba(0,0,0,.7); color: #fff; font-size: .75rem; font-weight: 700; padding: .3rem .6rem; border-radius: 999px; }
  .portfolio-card .body { padding: 1.5rem; }
  .portfolio-card h4 { font-size: 1.05rem; margin-bottom: .5rem; }
  .portfolio-card p { color: var(--text-soft); font-size: .9rem; line-height: 1.6; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 2rem; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: var(--radius); }
  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 140px)); gap: 1.25rem; max-width: 1100px; margin: 0 auto; }
  .folder-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
  .folder-card .img-wrap { width: 100%; padding-top: 100%; position: relative; background: var(--surface-alt); flex-shrink: 0; }
  .folder-card .img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .folder-card .body { padding: .75rem; }
  .folder-card h4 { font-size: .85rem; margin-bottom: .15rem; }
  .folder-card p { color: var(--text-muted); font-size: .72rem; }
  .back-link { display: inline-flex; align-items: center; gap: .4rem; color: var(--info); font-weight: 600; font-size: .9rem; cursor: pointer; margin-bottom: 1.5rem; }
  .folder-heading { text-align: center; margin-bottom: 2rem; }
  .section-label { text-align: center; color: var(--text-muted); font: 700 .85rem var(--font-display); letter-spacing: .04em; text-transform: uppercase; margin: 3rem 0 1.5rem; }
  .section-label:first-child { margin-top: 0; }
  .cta-band { background: linear-gradient(135deg, rgba(0,181,254,.13), rgba(253,125,1,.13)); padding: 3.5rem 4rem; text-align: center; }
  .cta-band h3 { font-size: 1.9rem; margin-bottom: .75rem; }
  .cta-band button { width: auto; margin: 0 auto; padding: 1rem 2.25rem; }
  @media (max-width: 760px) {
    .cnav { padding: 1rem 1.25rem; }
    .menu-toggle { display: block; }
    .cnav-right button:not(.menu-toggle) { display: none; }
    .cnav-links { display: none; width: 100%; order: 3; flex-direction: column; gap: 0; margin-top: 1rem; }
    .cnav-links.open { display: flex; }
    .cnav-links a { padding: .85rem 0; border-bottom: 1px solid var(--border); }
    .cnav button { padding: .6rem 1.1rem; font-size: .85rem; }
    .csection { padding: 3rem 1.25rem; }
    .cta-band { padding: 2.5rem 1.25rem; }
    .cta-band button { padding: .8rem 1.5rem; font-size: .9rem; }
    .folder-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 110px)); gap: 1rem; }
  }
</style>
</head>
<body class="course-page">

<nav class="cnav">
  <span class="brand"><span class="a">A</span>mpplify Academy</span>
  <div class="cnav-links">
    <a href="course.html#curriculum">Curriculum</a>
    <a href="services.html">Services</a>
    <a href="tools.html" id="navToolsLink">Tools</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="success-stories.html">Success Stories</a>
    <a href="course.html#pricing">Pricing</a>
  </div>
  <div class="cnav-right">
    <div class="nav-social" id="navSocial"></div>
    <button class="menu-toggle" onclick="toggleMobileNav()" id="menuToggleBtn">☰ Menu</button>
  </div>
</nav>

<section class="csection" style="padding-top:3.5rem;">
  <h2>Our Portfolio</h2>
  <p class="lead">A look at work we've done.</p>

  <div id="folderListView">
    <div id="ungroupedSection"></div>
    <div id="folderGridSection"></div>
  </div>

  <div id="folderDetailView" style="display:none;">
    <span class="back-link" onclick="showFolderList()">← Back to Portfolio</span>
    <div class="folder-heading"><h2 id="folderDetailTitle"></h2></div>
    <div class="portfolio-grid" id="folderDetailGrid"></div>
  </div>
</section>

<div class="cta-band">
  <h3>Want work like this?</h3>
  <button onclick="location.href='services.html'">See Our Services</button>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
  <div id="lightboxVideoWrap" style="display:none; width:100%; max-width:560px; aspect-ratio:16/9;" onclick="event.stopPropagation()">
    <iframe id="lightboxVideo" src="" style="width:100%; height:100%; border:none;" allowfullscreen scrolling="no"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/site-content.js"></script>
<script>
function toggleMobileNav() {
  document.querySelector('.cnav-links').classList.toggle('open');
}

let allFolders = [];
let ungroupedItems = [];
let activeLightboxItems = [];

function itemCard(p, i) {
  return `
    <div class="portfolio-card" onclick="openLightbox(${i})">
      ${p.imageUrl ? `<div class="img-wrap"><img src="${driveImgUrl(p.imageUrl)}" alt="${p.title}">${p.videoUrl ? '<span class="video-badge">▶ Video</span>' : ''}</div>` : (p.videoUrl ? `<div class="img-wrap"><div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2.5rem; background:var(--surface-alt);">▶</div></div>` : '')}
      <div class="body">
        <h4>${p.title}</h4>
        <p>${p.desc || ''}</p>
      </div>
    </div>`;
}

loadSiteContent().then(content => {
  ungroupedItems = content.course.portfolio || [];
  allFolders = content.course.portfolioFolders || [];

  const ungroupedSection = document.getElementById('ungroupedSection');
  if (ungroupedItems.length) {
    ungroupedSection.innerHTML = (allFolders.length ? '<div class="section-label">Portfolio</div>' : '')
      + `<div class="portfolio-grid">${ungroupedItems.map((p, i) => itemCard(p, i)).join('')}</div>`;
  }

  const folderSection = document.getElementById('folderGridSection');
  if (allFolders.length) {
    folderSection.innerHTML = (ungroupedItems.length ? '<div class="section-label">Folders</div>' : '')
      + `<div class="folder-grid">${allFolders.map((f, fi) => {
        const cover = (f.items || []).find(it => it.imageUrl);
        const count = (f.items || []).length;
        return `
        <div class="folder-card" onclick="openFolder(${fi})">
          ${cover ? `<div class="img-wrap"><img src="${driveImgUrl(cover.imageUrl)}" alt="${f.name}"></div>` : ''}
          <div class="body">
            <h4>${f.name}</h4>
            <p>${count} image${count === 1 ? '' : 's'}</p>
          </div>
        </div>`;
      }).join('')}</div>`;
  }

  if (!ungroupedItems.length && !allFolders.length) {
    document.getElementById('ungroupedSection').innerHTML = '<p style="text-align:center; color:var(--text-muted);">Portfolio coming soon.</p>';
  }

  const firstTool = (content.course.tools || [])[0];
  if (firstTool && firstTool.link) {
    const link = document.getElementById('navToolsLink');
    link.href = firstTool.link;
    link.target = '_blank';
  }

  renderSocialNav(content.social, 'navSocial');
});

function openFolder(fi) {
  const folder = allFolders[fi];
  activeLightboxItems = folder.items || [];
  document.getElementById('folderDetailTitle').textContent = folder.name;
  document.getElementById('folderDetailGrid').innerHTML = activeLightboxItems.map((p, i) => itemCard(p, i)).join('');
  document.getElementById('folderListView').style.display = 'none';
  document.getElementById('folderDetailView').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showFolderList() {
  document.getElementById('folderDetailView').style.display = 'none';
  document.getElementById('folderListView').style.display = 'block';
  activeLightboxItems = [];
}

function openLightbox(i) {
  const source = activeLightboxItems.length ? activeLightboxItems : ungroupedItems;
  const p = source[i];
  if (!p.imageUrl && !p.videoUrl) return;

  const img = document.getElementById('lightboxImg');
  const videoWrap = document.getElementById('lightboxVideoWrap');
  const videoFrame = document.getElementById('lightboxVideo');

  if (p.videoUrl) {
    videoFrame.src = fbVideoEmbedUrl(p.videoUrl);
    videoWrap.style.display = 'block';
    img.style.display = 'none';
  } else {
    img.src = driveImgUrl(p.imageUrl);
    img.style.display = 'block';
    videoWrap.style.display = 'none';
    videoFrame.src = '';
  }
  document.getElementById('lightbox').classList.add('show');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxVideo').src = '';
}
</script>
</body>
</html>
