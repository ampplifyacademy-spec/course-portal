<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>এডমিন প্যানেল</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card wide">
  <div class="top-bar">
    <h1>এডমিন প্যানেল</h1>
    <button class="secondary" style="width:auto;" onclick="doLogout()">লগআউট</button>
  </div>

  <h2 style="margin-top:1rem;">ইউজার রিকোয়েস্ট</h2>
  <table>
    <thead><tr><th>নাম</th><th>ইমেইল</th><th>Txn ID</th><th>স্ট্যাটাস</th><th>একশন</th><th>কোর্স এক্সেস</th></tr></thead>
    <tbody id="userRows"></tbody>
  </table>

  <h2 style="margin-top:2rem;">কোর্স যোগ করো</h2>
  <input id="courseName" placeholder="কোর্সের নাম">
  <input id="driveLink" placeholder="Google Drive লিংক (unlisted)">
  <button onclick="addCourse()">কোর্স যোগ করো</button>
  <p class="msg" id="courseMsg"></p>

  <h2 style="margin-top:2rem;">বর্তমান কোর্স</h2>
  <ul class="course-list" id="courseList"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
let allCourses = [];

auth.onAuthStateChanged(user => {
  if (!user || !ADMIN_EMAILS.includes(user.email)) {
    location.href = 'login.html';
    return;
  }
  loadCourses().then(loadUsers);
});

function loadUsers() {
  db.collection('users').orderBy('createdAt', 'desc').get().then(snap => {
    const rows = document.getElementById('userRows');
    rows.innerHTML = '';
    snap.forEach(doc => {
      const u = doc.data();
      const blocked = u.blockedCourses || [];
      const tr = document.createElement('tr');

      let accessHtml = '<span style="color:#666;">—</span>';
      if (u.status === 'approved' && allCourses.length) {
        accessHtml = '<ul class="course-access-list">' + allCourses.map(c => {
          const isBlocked = blocked.includes(c.id);
          return `<li><span>${c.name}</span>
            <button class="${isBlocked ? '' : 'danger'}" onclick="toggleCourseAccess('${doc.id}','${c.id}',${isBlocked})">${isBlocked ? 'Restore' : 'Remove'}</button></li>`;
        }).join('') + '</ul>';
      }

      tr.innerHTML = `
        <td>${u.name || ''}</td>
        <td>${u.email}</td>
        <td>${u.txn || ''}</td>
        <td class="status-${u.status}">${u.status}</td>
        <td>
          <button style="width:auto;" onclick="setStatus('${doc.id}','approved')">Approve</button>
          <button class="danger" style="width:auto;" onclick="setStatus('${doc.id}','rejected')">Reject</button>
        </td>
        <td>${accessHtml}</td>`;
      rows.appendChild(tr);
    });
  });
}

function setStatus(uid, status) {
  db.collection('users').doc(uid).update({ status }).then(loadUsers);
}

function toggleCourseAccess(uid, courseId, currentlyBlocked) {
  const op = currentlyBlocked
    ? firebase.firestore.FieldValue.arrayRemove(courseId)
    : firebase.firestore.FieldValue.arrayUnion(courseId);
  db.collection('users').doc(uid).update({ blockedCourses: op }).then(loadUsers);
}

function addCourse() {
  const name = document.getElementById('courseName').value.trim();
  const driveLink = document.getElementById('driveLink').value.trim();
  const msg = document.getElementById('courseMsg');
  if (!name || !driveLink) { msg.textContent = "নাম আর লিংক দুটোই দাও"; return; }
  db.collection('courses').add({ name, driveLink }).then(() => {
    document.getElementById('courseName').value = '';
    document.getElementById('driveLink').value = '';
    msg.style.color = '#4fdc7c';
    msg.textContent = "কোর্স যোগ হয়েছে";
    loadCourses().then(loadUsers);
  });
}

function loadCourses() {
  return db.collection('courses').get().then(snap => {
    allCourses = [];
    const list = document.getElementById('courseList');
    list.innerHTML = '';
    snap.forEach(doc => {
      const c = doc.data();
      allCourses.push({ id: doc.id, name: c.name });
      const li = document.createElement('li');
      li.innerHTML = `<span>${c.name}</span><button class="danger" style="width:auto;" onclick="deleteCourse('${doc.id}')">মুছো</button>`;
      list.appendChild(li);
    });
  });
}

function deleteCourse(id) {
  db.collection('courses').doc(id).delete().then(() => loadCourses().then(loadUsers));
}

function doLogout() {
  auth.signOut().then(() => location.href = 'login.html');
}
</script>
</body>
</html>
