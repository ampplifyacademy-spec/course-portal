<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign In · Ampplify Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="split">
<div class="split-wrap">
  <div class="split-brand">
    <span class="brand"><span class="a">A</span>mpplify Academy</span>
    <h1>Welcome back. Let's keep building.</h1>
    <p>Sign in to continue your courses — pick up right where you left off.</p>
    <img src="assets/mascot.png" alt="Instructor" style="width:280px; border-radius:20px; box-shadow:0 30px 60px rgba(0,0,0,.5); margin-top:2.5rem;">
  </div>

  <div class="split-form">
    <div class="inner">
      <h1>Sign In</h1>
      <p class="subtitle">Enter your details to access your dashboard.</p>

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••">
      <button onclick="doLogin()">Sign In to Dashboard</button>
      <p class="msg" id="msg"></p>

      <p class="link"><a href="forgot.html">Forgot your password?</a></p>
      <p class="link">New to Ampplify Academy? <a href="signup.html">Enroll now</a></p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');

  auth.signInWithEmailAndPassword(email, password)
    .then(cred => {
      if (ADMIN_EMAILS.includes(cred.user.email)) {
        location.href = 'admin.html';
        return;
      }
      return db.collection('users').doc(cred.user.uid).get().then(doc => {
        const status = doc.exists ? doc.data().status : 'pending';
        if (status === 'approved') {
          const sessionId = crypto.randomUUID();
          return db.collection('users').doc(cred.user.uid).update({ currentSessionId: sessionId }).then(() => {
            localStorage.setItem('session_' + cred.user.uid, sessionId);
            location.href = 'student.html';
          });
        } else if (status === 'rejected') {
          msg.textContent = "Your account has been rejected. Please contact the admin.";
          auth.signOut();
        } else {
          msg.textContent = "Your account is still pending approval. Please wait.";
          auth.signOut();
        }
      });
    })
    .catch(err => { msg.textContent = err.message; });
}
</script>
</body>
</html>
