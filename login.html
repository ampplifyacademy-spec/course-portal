<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log In · Course Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <div class="card-icon">👋</div>
  <h1>Welcome Back</h1>
  <p class="subtitle">Log in to access your courses.</p>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="doLogin()">Log In</button>
  <p class="msg" id="msg"></p>
  <p class="link"><a href="forgot.html">Forgot your password?</a></p>
  <p class="link">Don't have an account? <a href="signup.html">Sign up</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');

  auth.signInWithEmailAndPassword(email, password)
    .then(cred => {
      if (ADMIN_EMAILS.includes(cred.user.email)) {
        location.href = 'admin.html';
        return;
      }
      return db.collection('users').doc(cred.user.uid).get().then(doc => {
        const status = doc.exists ? doc.data().status : 'pending';
        if (status === 'approved') {
          const sessionId = crypto.randomUUID();
          return db.collection('users').doc(cred.user.uid).update({ currentSessionId: sessionId }).then(() => {
            localStorage.setItem('session_' + cred.user.uid, sessionId);
            location.href = 'student.html';
          });
        } else if (status === 'rejected') {
          msg.textContent = "Your account has been rejected. Please contact the admin.";
          auth.signOut();
        } else {
          msg.textContent = "Your account is still pending approval. Please wait.";
          auth.signOut();
        }
      });
    })
    .catch(err => { msg.textContent = err.message; });
}
</script>
</body>
</html>
