<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>লগইন</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="card">
  <h1>লগইন</h1>
  <input id="email" type="email" placeholder="ইমেইল">
  <input id="password" type="password" placeholder="পাসওয়ার্ড">
  <button onclick="doLogin()">লগইন করো</button>
  <p class="msg" id="msg"></p>
  <p class="link"><a href="forgot.html">পাসওয়ার্ড ভুলে গেছো?</a></p>
  <p class="link">অ্যাকাউন্ট নাই? <a href="signup.html">সাইনআপ করো</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');

  auth.signInWithEmailAndPassword(email, password)
    .then(cred => {
      if (ADMIN_EMAILS.includes(cred.user.email)) {
        location.href = 'admin.html';
        return;
      }
      return db.collection('users').doc(cred.user.uid).get().then(doc => {
        const status = doc.exists ? doc.data().status : 'pending';
        if (status === 'approved') {
          location.href = 'student.html';
        } else if (status === 'rejected') {
          msg.textContent = "তোমার অ্যাকাউন্ট reject হয়েছে। এডমিনের সাথে যোগাযোগ করো।";
          auth.signOut();
        } else {
          msg.textContent = "এখনো approve হয়নি। একটু অপেক্ষা করো।";
          auth.signOut();
        }
      });
    })
    .catch(err => { msg.textContent = err.message; });
}
</script>
</body>
</html>
